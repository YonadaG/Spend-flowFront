name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build_and_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # Using npm ci for a cleaner and faster install on CI
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
